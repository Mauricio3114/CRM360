{% extends "base.html" %}

{% block content %}

<style>
    .meta-container {
        max-width: 600px;
        margin: auto;
    }

    .meta-card {
        background: linear-gradient(180deg, #020617, #0b1220);
        border: 1px solid #1e293b;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }

    .meta-header {
        margin-bottom: 20px;
    }

    .meta-header h2 {
        margin: 0;
        font-size: 26px;
    }

    .meta-header p {
        color: #94a3b8;
        font-size: 14px;
        margin-top: 5px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #94a3b8;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #1e293b;
        background: #020617;
        color: #fff;
        font-size: 14px;
    }

    .form-group input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34,197,94,.2);
    }

    .meta-actions {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #02130a;
        padding: 10px 18px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 10px 20px rgba(34,197,94,.2);
    }

    .btn-secondary {
        background: #1e293b;
        color: #cbd5e1;
        padding: 10px 18px;
        border-radius: 10px;
        text-decoration: none;
    }

    .hint {
        font-size: 12px;
        color: #64748b;
        margin-top: 4px;
    }
</style>

<div class="meta-container">
    <div class="meta-card">

        <div class="meta-header">
            <h2>Nova Meta</h2>
            <p>Defina objetivos financeiros para acompanhar o crescimento.</p>
        </div>

        <form method="POST">

            <div class="form-group">
                <label>Nome da meta</label>
                <input type="text" name="nome" placeholder="Ex: Meta mensal Maio" required>
                <div class="hint">Use nomes claros para organizar melhor.</div>
            </div>

            <div class="form-group">
                <label>Valor da meta (R$)</label>
                <input type="number" step="0.01" name="valor" placeholder="Ex: 10000" required>
                <div class="hint">Valor que deseja atingir no período.</div>
            </div>

            <div class="meta-actions">
                <a href="{{ url_for('metas.index') }}" class="btn-secondary">Voltar</a>
                <button type="submit" class="btn-primary">Salvar Meta</button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
