<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinar MaVa CRM</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:radial-gradient(circle at top right, #052e16, #020817 45%, #020617);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:30px;
        }

        .card{
            width:100%;
            max-width:540px;
            background:#0f172a;
            border-radius:28px;
            padding:35px;
            border:1px solid rgba(255,255,255,.08);
            box-shadow:0 0 45px rgba(0,0,0,.35);
        }

        h1{
            color:#fff;
            font-size:32px;
            margin-bottom:10px;
        }

        p{
            color:#94a3b8;
            margin-bottom:28px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        input, select{
            height:58px;
            border:none;
            outline:none;
            border-radius:18px;
            padding:0 18px;
            background:#020817;
            color:#fff;
            border:1px solid rgba(255,255,255,.06);
            font-size:15px;
        }

        button{
            height:60px;
            border:none;
            border-radius:18px;
            background:linear-gradient(135deg,#22c55e,#16a34a);
            color:#fff;
            font-size:16px;
            font-weight:800;
            cursor:pointer;
            margin-top:10px;
            transition:.2s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .flash-box{
            margin-bottom:24px;
        }

        .flash-msg{
            padding:20px;
            border-radius:20px;
            margin-bottom:14px;
            color:#fff;
            font-weight:700;
            font-size:15px;
            line-height:1.6;
            border:1px solid rgba(255,255,255,.10);
        }

        .flash-success{
            background:linear-gradient(135deg, rgba(34,197,94,.22), rgba(22,163,74,.12));
            border-color:rgba(34,197,94,.45);
            color:#dcfce7;
        }

        .flash-danger{
            background:rgba(220,38,38,.18);
            border-color:rgba(248,113,113,.45);
            color:#fecaca;
        }

        .flash-warning{
            background:rgba(245,158,11,.18);
            border-color:rgba(251,191,36,.45);
            color:#fde68a;
        }

        .flash-info{
            background:rgba(37,99,235,.18);
            border-color:rgba(96,165,250,.45);
            color:#bfdbfe;
        }

        .login-link{
            display:inline-flex;
            margin-top:14px;
            padding:12px 16px;
            border-radius:14px;
            background:#22c55e;
            color:#052e16;
            font-weight:900;
            text-decoration:none;
        }
    </style>
</head>

<body>

    <div class="card">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-box">
                    {% for category, message in messages[-1:] %}
                        <div class="flash-msg flash-{{ category }}">
                            <div style="white-space:pre-line;">{{ message }}</div>

                            {% if category == "success" %}
                                <a class="login-link" href="{{ url_for('auth.login') }}">
                                    Ir para o login →
                                </a>
                            {% endif %}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <h1>Assinar MaVa CRM</h1>

        <p>
            Crie sua conta e comece agora mesmo.
        </p>

        <form method="POST">

            <input type="text" name="nome" placeholder="Seu nome" required>

            <input type="text" name="empresa" placeholder="Nome da empresa" required>

            <input type="email" name="email" placeholder="Seu e-mail" required>

            <input type="text" name="telefone" placeholder="Telefone / WhatsApp">

            <select name="plano" required>
                <option value="">Escolha um plano</option>
                <option value="basico">Básico - R$97/mês</option>
                <option value="pro">Pro - R$197/mês</option>
                <option value="premium">Premium - R$297/mês</option>
            </select>

            <button type="submit">
                Assinar Agora
            </button>

        </form>

    </div>

</body>
</html>
