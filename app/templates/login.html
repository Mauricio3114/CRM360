<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login | MaVa CRM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(34,197,94,.12), transparent 25%),
                radial-gradient(circle at bottom left, rgba(34,197,94,.08), transparent 20%),
                #0f172a;

            color: #fff;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .login-card {
            width: 430px;
            background: rgba(2,6,23,.92);
            border: 1px solid #1e293b;
            border-radius: 26px;
            padding: 38px;
            backdrop-filter: blur(12px);
            box-shadow:
                0 20px 60px rgba(0,0,0,.45),
                0 0 80px rgba(34,197,94,.05);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            background: rgba(34,197,94,.05);
            border-radius: 50%;
            top: -90px;
            right: -90px;
        }

        .logo {
            margin-bottom: 28px;
            position: relative;
            z-index: 2;
        }

        .logo h1 {
            margin: 0;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -.5px;
        }

        .logo h1 span {
            color: #22c55e;
        }

        .logo p {
            margin-top: 8px;
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 14px;
            font-weight: 700;
            color: #e2e8f0;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            outline: none;
            transition: .2s;
            font-size: 15px;
        }

        input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34,197,94,.12);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 22px;
            flex-wrap: wrap;
        }

        button,
        .btn-link {
            flex: 1;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #02130a;
            border: none;
            padding: 13px 16px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            transition: .2s;
            font-size: 14px;
        }

        button:hover,
        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(34,197,94,.22);
        }

        .btn-secondary {
            background: #1e293b;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .flash {
            background: rgba(239,68,68,.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,.35);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .footer-text {
            margin-top: 26px;
            text-align: center;
            color: #64748b;
            font-size: 12px;
        }

        @media (max-width: 520px) {

            .login-card {
                width: 100%;
                padding: 28px;
                border-radius: 20px;
            }

            .logo h1 {
                font-size: 34px;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="logo">
            <h1>Ma<span>Va</span> CRM</h1>

            <p>
                Plataforma inteligente para gestão comercial,
                leads, automações, WhatsApp e IA SDR.
            </p>
        </div>

        {% with mensagens = get_flashed_messages() %}
            {% if mensagens %}
                {% for msg in mensagens %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <div class="buttons">
                <button type="submit">
                    Entrar no Sistema
                </button>

                <a class="btn-link btn-secondary"
                    href="{{ url_for('contratacao.contratar') }}">
                    Criar Empresa
                </a>
            </div>

        </form>

        <div style="
            margin-top:18px;
            text-align:center;
        ">
            <a
                href="{{ url_for('recuperar_senha.recuperar') }}"
                style="
                    color:#22c55e;
                    text-decoration:none;
                    font-size:14px;
                    font-weight:700;
                "
            >
                Esqueci minha senha
            </a>
        </div>

    </div>

</body>
</html>
